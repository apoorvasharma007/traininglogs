services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: traininglogs
      POSTGRES_USER: traininglogs
      POSTGRES_PASSWORD: traininglogs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db_test:
    image: postgres:16
    environment:
      POSTGRES_DB: traininglogs_test
      POSTGRES_USER: traininglogs
      POSTGRES_PASSWORD: traininglogs
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_test_data:
